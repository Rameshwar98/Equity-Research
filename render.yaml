# Render Blueprint — attach a persistent disk so portfolios survive redeploys.
# Dashboard: New > Blueprint > connect this repo, or add a disk to an existing Web Service.
#
# Requires a paid instance plan (disks are not available on the free tier).
# After deploy, set secrets in the Render dashboard: FMP_API_KEY, ALLOWED_ORIGINS.

services:
  - type: web
    name: equity-research-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    disk:
      name: equity-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: DATA_DIR
        value: /var/data/equity
      - key: CACHE_DIR
        value: /var/data/equity
      - key: DB_PATH
        value: /var/data/equity/equity.db
      - key: PERSIST_CACHE
        value: "true"
      - key: FMP_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
